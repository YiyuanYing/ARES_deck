controller_panel:
  local_ip: "192.168.1.20"
  remote_ip: "192.168.1.50"
  port: 5005
  map_port: 5006
  send_hz: 100.0
  failsafe_timeout_ms: 150
  touch_device: ""
  no_touch_reader: false
  touch_swap_xy: false
  touch_invert_x: false
  touch_invert_y: false
  debug_touch: false

udp_receiver:
  bind_ip: "0.0.0.0"
  port: 5005
  map_port: 5006
  map_receiver_enabled: true
  control_hz: 100.0
  log_hz: 50.0
  log_format: "block"

udp_sender:
  local_ip: "192.168.1.20"
  target_ip: "192.168.1.50"
  target_port: 5005
  send_hz: 100.0
  failsafe_timeout_ms: 150

ros_udp_receiver:
  bind_ip: "0.0.0.0"
  port: 5005
  publish_hz: 100.0
  controller_topic: "/controller"
  tx_id_topic: "/aruco_comm/tx_id"
  debug_log: true
  debug_log_hz: 10.0
  debug_log_format: "block"
  button_to_tx_id: "{}"
